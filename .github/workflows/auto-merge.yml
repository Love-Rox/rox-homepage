name: Auto-merge owner PRs

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  enable:
    if: github.event.pull_request.user.login == 'sasagar' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      # Use a PAT (not GITHUB_TOKEN) so the merge commit is authored by the
      # owner — this lets the resulting push trigger deploy.yml. --admin
      # bypasses the required-review rule for owner PRs while still waiting
      # on required status checks via --auto.
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash --admin "$PR_URL"
