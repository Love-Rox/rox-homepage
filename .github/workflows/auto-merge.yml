name: Auto-merge owner PRs

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  enable:
    if: github.event.pull_request.user.login == 'sasagar' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      # Mint a token from a GitHub App installation so the merge commit is
      # authored by the App (not GITHUB_TOKEN). The resulting push then
      # triggers deploy.yml — GITHUB_TOKEN-authored pushes do not. App tokens
      # auto-rotate hourly, so there is no PAT expiry to manage.
      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # `--admin` bypasses the required-review rule for owner PRs while still
      # waiting on required status checks via `--auto`.
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash --admin "$PR_URL"
