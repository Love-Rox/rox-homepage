name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time; cancel in-flight runs when a newer commit lands on main.
concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://love-rox.cc
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Cloudflare adapter)
        run: bun run build
        env:
          CLOUDFLARE: "1"
          # Build-time public Turnstile site key — baked into the client bundle.
          # Runtime secrets (TURNSTILE_SECRET_KEY, DISCORD_CONTACT_WEBHOOK_URL)
          # live in Cloudflare's secret store and are read at request time.
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}

      - name: Deploy with wrangler
        # `waku build` with CLOUDFLARE=1 emits dist/server/wrangler.json with the
        # right `main` and `assets.directory` paths; running wrangler from there
        # picks it up automatically.
        working-directory: dist/server
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
